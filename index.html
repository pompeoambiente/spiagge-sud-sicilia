<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spiagge del Sud della Sicilia</title>
<!-- Mobile UX fix: zoom abilitato, bottom sheet a 3 stati, posizione utente, CTA indicazioni primaria. -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#10242e;--paper:#fbf6ec;--card:#fff;--line:#e7ddc9;--accent:#e0683c;--accent-2:#1fa0a8;--sea:#0d83b8;--shadow:0 14px 40px -18px rgba(7,59,82,.45);--sidebar:380px}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"Hanken Grotesk",system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh;height:100dvh}
#map{height:100vh;height:100dvh;z-index:1;background:radial-gradient(120% 120% at 30% 0%,#bfe6f2 0%,#7ec6e0 45%,#3f9ec9 100%)}
.leaflet-container{background:transparent !important}

.sidebar{height:100vh;height:100dvh;background:var(--paper);display:flex;flex-direction:column;border-right:1px solid var(--line);position:relative;z-index:5;box-shadow:8px 0 30px -20px rgba(0,0,0,.4)}
.grip{display:none}
.shead{padding:16px 18px 12px;background:linear-gradient(180deg,#0a4f6e,#0d6c93);color:#fff}
.shead .row{display:flex;align-items:center;gap:11px}
.mark{font-size:22px;background:#fff;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;transform:rotate(-4deg);box-shadow:0 6px 14px -6px rgba(0,0,0,.5)}
.shead h1{font-family:"Fraunces",serif;font-weight:900;font-size:21px;margin:0;line-height:1;letter-spacing:-.02em}
.shead h1 em{font-style:italic;color:#ffd9a0;font-weight:500}
.shead p{margin:7px 0 0;font-size:12px;color:#cdeeff}
.search{display:flex;align-items:center;gap:9px;background:#fff;margin:12px 14px 0;border-radius:13px;padding:12px 14px;box-shadow:var(--shadow)}
.search svg{opacity:.45;flex:none}
.search input{border:0;outline:0;flex:1;font:inherit;font-size:16px;background:transparent;min-width:0}
.search .x{border:0;background:#eee;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;line-height:1;color:#666;display:none;flex:none}
.search .x.show{display:block}
.filters{padding:10px 14px 4px;border-bottom:1px solid var(--line)}
.chiprow{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chiprow::-webkit-scrollbar{display:none}
.chiprow .lab{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9a9480;align-self:center;white-space:nowrap;flex:none}
.chip{flex:none;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#4a5d63;white-space:nowrap;transition:.15s}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.prov.on{background:var(--sea);border-color:var(--sea)}
.chip.blu.on{background:#1f6fb8;border-color:#1f6fb8}
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.countbar{padding:11px 18px 4px;font-size:12.5px;color:#7a7460;font-weight:600}
.countbar b{color:var(--accent)}
.row-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;align-items:center}
.row-item.sel{background:#fff;box-shadow:inset 4px 0 0 var(--accent)}
.thumb{width:80px;height:66px;border-radius:11px;flex:none;position:relative;overflow:hidden;background:#bfe6f2}
.thumb svg,.dhero svg{position:absolute;inset:0;width:100%;height:100%;display:block}
.thumb img.ph,.dhero img.ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.ri-body{min-width:0;flex:1}
.ri-body h3{font-family:"Fraunces",serif;font-weight:600;font-size:16px;margin:0;line-height:1.05;letter-spacing:-.01em}
.ri-loc{font-size:12px;color:#8a8470;font-weight:600;margin:2px 0 5px}
.mini{display:flex;gap:5px;flex-wrap:wrap}
.minit{font-size:10px;font-weight:700;background:#f1ece0;border-radius:6px;padding:2px 6px;color:#5a6}
.minit.bb{background:#1f6fb8;color:#fff}.minit.ris{background:#1d8a52;color:#fff}

.detail{display:none;flex-direction:column;height:100%;min-height:0}
.detail.open{display:flex}
.app.detailing .scroller .listing{display:none}
.dback{display:flex;align-items:center;gap:8px;padding:13px 14px;font-weight:700;font-size:14px;cursor:pointer;border-bottom:1px solid var(--line);background:var(--paper);flex:none}
.dscroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.dhero{height:190px;position:relative;overflow:hidden;background:#bfe6f2}
.dhero .tags{position:absolute;left:12px;bottom:12px;display:flex;gap:6px;flex-wrap:wrap;z-index:3}
.dhero .credit{position:absolute;right:8px;bottom:6px;z-index:3;font-size:9px;color:#fff;background:rgba(0,0,0,.4);padding:2px 6px;border-radius:5px;text-decoration:none}
.dhero .shade{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(0,0,0,.35) 100%);pointer-events:none}
.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;background:rgba(255,255,255,.92);color:#0a4f6e}
.tag.bb{background:#1f6fb8;color:#fff}.tag.ris{background:#1d8a52;color:#fff}
.dbody{padding:16px 18px 30px}
.dbody h2{font-family:"Fraunces",serif;font-weight:900;font-size:26px;margin:0;letter-spacing:-.02em;line-height:1}
.dloc{font-size:13px;color:#8a8470;font-weight:600;margin:6px 0 12px}
.ddesc{font-size:15px;line-height:1.55;color:#2b3d43;margin:0 0 16px}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.spec{background:#fff;padding:10px 13px}
.spec .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#9a9480;font-weight:700}
.spec .v{font-size:14px;font-weight:600;margin-top:2px}
.drow{margin-top:15px}
.drow .lab{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9a9480}
.drow .feats{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px}
.feat{font-size:11.5px;font-weight:600;color:#456;background:#f1ece0;border-radius:7px;padding:4px 9px}
.wiki{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 15px;display:none}
.wiki.show{display:block}
.wiki h4{margin:0 0 6px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9a9480}
.wiki p{margin:0;font-size:14px;line-height:1.55;color:#33424a}
.wiki a{color:var(--sea);font-weight:700;font-size:12.5px;text-decoration:none;display:inline-block;margin-top:8px}
.wikiload{margin-top:14px;font-size:12.5px;color:#9a9480}
.actions{display:flex;gap:9px;margin-top:20px;flex-wrap:wrap}
.act{flex:1;min-width:104px;text-align:center;text-decoration:none;font-weight:700;font-size:13.5px;padding:13px 12px;border-radius:12px;font-family:inherit;border:0;cursor:pointer}
.act.primary{background:var(--accent);color:#fff}
.act.sec{background:var(--ink);color:#fff}
.act.ter{background:#fff;border:1.5px solid var(--line);color:var(--ink)}

/* top-right map controls (no overlap with zoom top-left) */
.topctl{position:absolute;top:12px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.ctl{background:#fff;border-radius:11px;box-shadow:0 6px 18px -8px rgba(0,0,0,.45);overflow:hidden;display:flex;font-weight:700;font-size:12.5px;color:#0a4f6e}
.ctl.layers div{padding:8px 11px;cursor:pointer}
.ctl.layers div.on{background:var(--ink);color:#fff}
.ctl.jump{padding:9px 12px;cursor:pointer;border:0;font:inherit;font-weight:700}
.ctl.jump:active{background:var(--ink);color:#fff}
.legend{position:absolute;left:12px;bottom:16px;z-index:1000;background:rgba(255,255,255,.94);border-radius:11px;padding:9px 12px;font-size:11.5px;box-shadow:0 6px 18px -8px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:5px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);margin-right:7px;vertical-align:middle}
.pin{width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6)}
.pin.sel{width:27px;height:27px;border-width:3px}
.leaflet-popup-content{font-family:"Hanken Grotesk",sans-serif;margin:9px 11px}
.leaflet-popup-content h4{font-family:"Fraunces",serif;margin:0 0 2px;font-size:15px}
.leaflet-popup-content .pp{font-size:11px;color:#888;margin:0 0 7px}
.leaflet-popup-content button{border:0;background:var(--accent);color:#fff;padding:7px 12px;border-radius:8px;font:inherit;font-weight:700;font-size:12px;cursor:pointer}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  #map{position:fixed;inset:0;height:100vh;height:100dvh}
  .sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;height:87vh;height:87dvh;border-right:0;border-top-left-radius:22px;border-top-right-radius:22px;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;z-index:1200;box-shadow:0 -12px 44px -10px rgba(0,0,0,.5)}
  .shead{display:none}
  .grip{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 0 7px;cursor:pointer;flex:none;touch-action:none;user-select:none}
  .grip .handle{width:44px;height:5px;border-radius:3px;background:#cdbf9f}
  .grip .gtxt{font-size:12.5px;font-weight:700;color:#9a8d6e}
  .search{margin-top:2px}
  .legend{display:none}
  .topctl{top:10px;right:10px}
}
@media(min-width:861px){.sidebar{transform:none !important}}
.gallery{display:flex;gap:7px;overflow-x:auto;padding:10px 14px 2px;scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gallery img{height:74px;width:100px;object-fit:cover;border-radius:9px;flex:none;cursor:pointer;border:2px solid transparent;background:#dfeef5}
.gallery img.on{border-color:var(--accent)}
.galcap{display:none;padding:2px 14px 2px;font-size:11.5px;color:#9a9480;font-weight:600;line-height:1.35}
.wx{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 14px}
.wxc{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px;font-weight:600;color:#33424a}
.wxc b{font-size:15px;color:var(--ink)}
.wxmuted{color:#9a9480;font-size:12.5px;font-weight:600}
.near{margin-top:16px}
.near .lab{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9a9480}
.near .list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.near a.poi{display:flex;justify-content:space-between;gap:10px;text-decoration:none;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13.5px;font-weight:600}
.near a.poi .t{font-size:10.5px;color:#fff;background:var(--accent-2);border-radius:6px;padding:3px 8px;font-weight:700;align-self:center;white-space:nowrap}
.near a.poi .t.lido{background:#1f6fb8}
.near .links{display:flex;gap:8px;margin-top:9px}
.near .links a{flex:1;text-align:center;text-decoration:none;font-weight:700;font-size:12.5px;padding:11px;border-radius:11px;background:#f1ece0;color:var(--ink)}
.placehdr{padding:11px 18px 5px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#7a3cc0}
.placerow{padding:11px 18px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;cursor:pointer;display:flex;gap:9px;align-items:flex-start;line-height:1.3}
.placerow:before{content:"📍";flex:none}
.placerow:hover{background:#fff}
.placebusy{padding:10px 18px;font-size:12.5px;color:#9a9480;font-weight:600}
.tips{margin:9px 0 0;padding-left:20px;color:#33424a;font-size:13.5px;line-height:1.5}
.tips li{margin:4px 0}
.tips b{color:var(--ink)}
.fscore{font-size:17px;color:#e0a72f;margin:5px 0 9px;letter-spacing:2px}
.fscore span{font-size:12.5px;color:#6a6450;font-weight:700;margin-left:8px;letter-spacing:normal}
.feat.ok{background:#e3f3e6;color:#1d7a3e}
.feat.no{background:#f6e7e2;color:#b25a3e}
.tag.green{background:#1d8a52;color:#fff}
.near a.poi .t.kid{background:#1d8a52}
.favh{position:absolute;top:12px;left:12px;z-index:4;border:0;background:rgba(255,255,255,.94);width:42px;height:42px;border-radius:50%;font-size:21px;line-height:1;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.row-item{position:relative}
.rowfav{position:absolute;top:8px;right:8px;border:0;background:transparent;font-size:19px;cursor:pointer;padding:5px;line-height:1}
.wxc.warn{background:#fdf0e9;border-color:#f1c4ad;color:#b25a2e}
.cmodal{position:fixed;inset:0;z-index:3000;background:rgba(7,42,55,.55);display:none;align-items:flex-end;justify-content:center}
.cmodal.open{display:flex}
.cbox{background:var(--paper);width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:84vh;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.4)}
@media(min-width:600px){.cmodal{align-items:center;padding:20px}.cbox{border-radius:20px}}
.chead{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line);font-family:"Fraunces",serif;font-size:18px}
.chead button{border:0;background:#eee;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer}
.clist{overflow-y:auto;padding:6px 0}
.citem{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);font-size:15px;cursor:pointer}
.citem input{width:22px;height:22px;flex:none;accent-color:var(--accent)}
.citem.done{color:#9a9480;text-decoration:line-through}
.cfoot{padding:12px 18px;border-top:1px solid var(--line)}
.cfoot button{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:10px 14px;font:inherit;font-weight:700;cursor:pointer;color:var(--ink)}


/* --- Fix mobile UX + accessibilità --- */
button,input{font:inherit}
button{touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,.08)}
button:focus-visible,a:focus-visible,input:focus-visible{outline:3px solid rgba(31,160,168,.55);outline-offset:3px}
.filtertools{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filtertools::-webkit-scrollbar{display:none}
.filterToggle{display:none}
.chip.near.on{background:var(--accent-2);border-color:var(--accent-2);color:#fff}
.minit.dist{background:#e6f5fb;color:#0a6e9c}
.quickfacts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 0 14px}
.qfact{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 10px;font-size:12.5px;font-weight:700;color:#33424a;line-height:1.25}
.qfact.ok{background:#e3f3e6;color:#1d7a3e;border-color:#c5e6cd}
.qfact.no{background:#f6e7e2;color:#a64d34;border-color:#eac7bc}
.userpin{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.35);font-size:18px;border:2px solid var(--accent-2)}
@media(max-width:860px){
  .filters{padding-top:8px}
  .filterToggle{display:inline-flex;align-items:center;justify-content:center}
  .filters:not(.expanded) .advanced{display:none}
  .filtertools .chip,.chip,.act,.ctl.jump,#qx,#cclose,.rowfav,.favh{min-height:44px;min-width:44px}
  .chip{padding:10px 14px;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
  .search{padding:10px 12px;border-radius:15px}
  .search .x{width:36px;height:36px;font-size:14px}
  .row-item{min-height:92px;padding:12px 58px 12px 16px}
  .rowfav{top:10px;right:10px;border-radius:50%;background:rgba(255,255,255,.72)}
  .favh{width:46px;height:46px}
  .quickfacts{grid-template-columns:1fr}
  .dbody{padding-bottom:96px}
  .actions{position:sticky;bottom:0;margin:18px -18px -30px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(251,246,236,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:20;box-shadow:0 -10px 24px -20px rgba(0,0,0,.45)}
  .act{display:flex;align-items:center;justify-content:center;min-height:46px;padding:12px 10px}
  .act.primary{flex:1.55;font-size:14px}
  .act.sec,.act.ter{flex:.95}
  .topctl{gap:7px}
  .ctl.layers div{padding:11px 12px}
}
@media(prefers-reduced-motion:reduce){
  *{scroll-behavior:auto!important;animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="grip" id="grip"><span class="handle"></span><span class="gtxt" id="gtxt">▲ Mostra elenco spiagge</span></div>
    <div class="scroller" id="scroller">
      <div class="shead"><div class="row"><div class="mark">🏖️</div><div>
        <h1>Spiagge del <em>Sud Sicilia</em></h1><p>Clicca un pin o una spiaggia per i dettagli</p></div></div></div>
      <label class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Cerca spiaggia, comune o luogo…" aria-label="Cerca spiaggia, comune o luogo">
        <button class="x" id="qx" type="button" aria-label="Cancella ricerca">✕</button>
      </label>
      <div class="filters" id="filters">
        <div class="filtertools">
          <button class="chip filterToggle" id="filterToggle" type="button" aria-expanded="false">⚙️ Filtri</button>
          <button class="chip near" id="btnNearMe" type="button">📍 Vicine a me</button>
          <button class="chip" id="btnCheck" type="button">🧺 Checklist</button>
        </div>
        <div class="chiprow advanced" id="fProv"><span class="lab">Prov.</span></div>
        <div class="chiprow advanced" id="fTipo"><span class="lab">Tipo</span></div>
        <div class="chiprow" id="fFlags"><span class="lab">Rapidi</span></div>
      </div>
      <div class="listing"><div id="placeResults"></div><div class="countbar"><b id="cnt">0</b> spiagge</div><div id="list"></div></div>
    </div>
    <div class="detail" id="detail"><div class="dback" id="dback">← Torna all'elenco</div><div class="dscroll" id="dscroll"></div></div>
  </aside>
  <div id="map">
    <div class="topctl">
      <div class="ctl layers" id="layerToggle"><div class="on" data-l="sat">🛰️ Satellite</div><div data-l="map">🗺️ Mappa</div></div>
      <button class="ctl jump" id="jSud">↔ Costa sud</button>
      <button class="ctl jump" id="jPel">🏝️ Pelagie</button>
    </div>
    <div class="legend">
      <div><i style="background:#e0683c"></i> Spiaggia</div>
      <div><i style="background:#1f6fb8"></i> Bandiera Blu</div>
      <div><i style="background:#1d8a52"></i> Riserva</div>
    </div>
  </div>
</div>

{n:"Torre Salsa",c:"Siculiana",p:"Agrigento",lat:37.356,lng:13.356,t:"misto",bb:false,ris:"Riserva WWF Torre Salsa",acc:"Libera",aff:"Tranquilla",id:["Natura","Relax","Trekking/Calette"],sv:["Parcheggio sterrato"],mare:"Cristallino",d:"Sei km di costa selvaggia nella riserva WWF: dune, falesie bianche di gesso e spiaggia quasi deserta. Paradiso di natura intatta."},
{n:"Siculiana Marina",c:"Siculiana",p:"Agrigento",lat:37.3252,lng:13.396,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro limpido",d:"Borgo marinaro con lunga spiaggia premiata con la Bandiera Blu. Mare pulito e ambiente tranquillo, vicino a Torre Salsa."},

{n:"Punta Bianca",c:"Palma di Montechiaro",p:"Agrigento",lat:37.208,lng:13.664,t:"bianca",bb:false,ris:"Riserva Punta Bianca",acc:"Libera",aff:"Tranquilla",id:["Natura","Snorkeling","Trekking/Calette"],sv:["Nessun servizio"],mare:"Turchese trasparente",d:"Promontorio di marna bianca con calette di ciottoli e sabbia, a piedi. Mare trasparente e fondali per snorkeling, ambiente selvaggio."},
{n:"Marina di Palma",c:"Palma di Montechiaro",p:"Agrigento",lat:37.1905,lng:13.7645,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Spiaggia sabbiosa del borgo di Marina di Palma, con lidi e tratti liberi. Buona base per la vicina Punta Bianca."},
{n:"Mollarella e Poliscia",c:"Licata",p:"Agrigento",lat:37.084,lng:13.907,t:"fine",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Snorkeling","Relax"],sv:["Lidi","Parcheggio"],mare:"Turchese calmo",d:"Due baie gemelle di sabbia chiuse da un promontorio, con acque calme e basse: tra le più amate del Licatese, perfette per i bambini."},

{n:"Lido Foggia / Stazzone",c:"Sciacca",p:"Agrigento",lat:37.5055,lng:13.0875,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Spiaggia cittadina di Sciacca, sabbiosa e attrezzata, ai piedi della città termale. Tramonti aperti sul Canale di Sicilia."},

{n:"Lido Fiori",c:"Menfi",p:"Agrigento",lat:37.576,lng:12.943,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Tranquilla",id:["Famiglie","Natura","Relax"],sv:["Lidi","Parcheggio"],mare:"Cristallino",d:"Distesa sabbiosa con dune e vegetazione mediterranea vicino a Porto Palo. Mare cristallino, zona Bandiera Blu."},
{n:"Spiaggia dei Conigli",c:"Lampedusa",p:"Agrigento",lat:35.5119,lng:12.5556,t:"bianca",bb:false,ris:"Riserva Isola dei Conigli",acc:"Libera",aff:"Affollata",id:["Natura","Snorkeling","Famiglie","Relax"],sv:["Nessun servizio in spiaggia"],mare:"Turchese caraibico",d:"Spesso votata tra le più belle spiagge del mondo: sabbia bianchissima, acqua trasparente e l'isolotto dei Conigli di fronte. Nidifica la tartaruga Caretta caretta."},

function _seg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy;let t=L2?((px-ax)*dx+(py-ay)*dy)/L2:0;t=Math.max(0,Math.min(1,t));return[ax+t*dx,ay+t*dy];}
function snapCoast(lat,lng){let best=null,bd=Infinity;const g=SICILY.features[0].geometry;const polys=g.type==="MultiPolygon"?g.coordinates:[g.coordinates];for(const poly of polys){for(const ring of poly){for(let k=0;k<ring.length-1;k++){const a=ring[k],b=ring[k+1];const p=_seg(lng,lat,a[0],a[1],b[0],b[1]);const d=(p[0]-lng)**2+(p[1]-lat)**2;if(d<bd){bd=d;best=p;}}}}if(!best)return{lat,lng};return Math.sqrt(bd)<0.012?{lat:best[1],lng:best[0]}:{lat,lng};}

const wcache={};
async function wikiData(title){
  if(title in wcache)return wcache[title];
  try{
    const r=await fetch("https://it.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title.replace(/ /g,"_")),{headers:{accept:"application/json"}});
    if(!r.ok){wcache[title]=null;return null;}
    const j=await r.json();
    if(j.type==="disambiguation"){wcache[title]=null;return null;}
    wcache[title]={img:(j.originalimage&&j.originalimage.source)||(j.thumbnail&&j.thumbnail.source)||null,extract:j.extract||"",url:(j.content_urls&&j.content_urls.desktop&&j.content_urls.desktop.page)||""};
    return wcache[title];
  }catch(e){wcache[title]=null;return null;}
}

  const q=`[out:json][timeout:18];(node["leisure"="beach_resort"](around:1600,${lat},${lng});node["amenity"~"^(bar|cafe|restaurant|ice_cream)$"](around:1100,${lat},${lng});node["amenity"="pharmacy"](around:2500,${lat},${lng});node["leisure"="playground"](around:2500,${lat},${lng});node["amenity"="toilets"](around:1500,${lat},${lng}););out body 80;`;
  const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q)});
  if(!r.ok)return {beach:[],kids:[]};const j=await r.json();const sB=new Set(),sK=new Set(),beach=[],kids=[];
  for(const e of (j.elements||[])){const t=e.tags||{},name=t.name||"";
    if(t.leisure==="beach_resort"||/^(bar|cafe|restaurant|ice_cream)$/.test(t.amenity||"")){if(!name||sB.has(name))continue;sB.add(name);const lido=t.leisure==="beach_resort";beach.push({name,lido,kind:lido?"Lido":(t.amenity==="restaurant"?"Ristorante":t.amenity==="ice_cream"?"Gelateria":t.amenity==="cafe"?"Caffè":"Bar")});}
    else{const kind=t.amenity==="pharmacy"?"Farmacia":t.leisure==="playground"?"Parco giochi":"Bagni";const key=kind+"|"+(name||e.lat.toFixed(4));if(sK.has(key))continue;sK.add(key);kids.push({name:name||kind,kind});}
  }
  beach.sort((a,b)=>(a.lido===b.lido)?0:(a.lido?-1:1));
  const ord={Farmacia:0,"Parco giochi":1,Bagni:2};kids.sort((a,b)=>ord[a.kind]-ord[b.kind]);
  return {beach:beach.slice(0,8),kids:kids.slice(0,8)};
}catch(e){return {beach:[],kids:[]};}}

const app=document.getElementById("app"),detail=document.getElementById("detail"),dscroll=document.getElementById("dscroll");
window.openDetail=function(i){
  select(i,true);
  const b=beaches[i],token=i;
  const qbase=encodeURIComponent(`${b.n} ${b.c} Sicilia`);
  const photos="https://www.google.com/search?tbm=isch&q="+encodeURIComponent(`spiaggia ${b.n} ${b.c} Sicilia`);
  const sat="https://www.google.com/maps/search/?api=1&query="+qbase;
  const gmaps="https://www.google.com/maps/dir/?api=1&destination="+qbase;
  const barLink="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(`bar ${b.c} Sicilia`);
  const lidoLink="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(`lido stabilimento balneare ${b.c} Sicilia`);
  const tags=[];if(b.bb)tags.push('<span class="tag bb">🔵 Bandiera Blu</span>');if(b.ris)tags.push(`<span class="tag ris">🌿 ${b.ris}</span>`);
  if(GREENFLAG.includes(b.n))tags.push('<span class="tag green">🟢 Consigliata pediatri</span>');
  const fam=familyInfo(b);
  const lidi=b.sv.some(s=>/Lid/i.test(s))?"Sì":"No";
  const park=b.sv.some(s=>/Parchegg/i.test(s))?"Sì":"No";
  const sh=shadeInfo(b);
  const dist=state.loc?kmDistance(state.loc,{lat:b.mlat,lng:b.mlng}):null;
  dscroll.scrollTop=0;
  dscroll.innerHTML=`<div class="dhero" id="dhero">${sceneSVG(b)}<div class="shade"></div><button class="favh" id="favh" type="button" aria-label="${isFav(b)?'Rimuovi dai preferiti':'Aggiungi ai preferiti'}">${isFav(b)?'❤️':'🤍'}</button><div class="tags">${tags.join("")}</div></div>
    <div class="gallery" id="gallery"></div>
    <div class="galcap" id="galcap">Foto della spiaggia (Wikimedia) · tocca per usarla come copertina. Di default la copertina è la vista satellitare; per altre foto usa “📷 Altre foto”.</div>
    <div class="dbody"><h2>${b.n}</h2><div class="dloc">📍 ${b.c} · Provincia di ${b.p}</div>
    <div class="wx" id="wx"><span class="wxmuted">Meteo in tempo reale…</span></div>
    <div class="quickfacts">
      <span class="qfact ${fam.kid?'ok':'no'}">👶 ${fam.kid?'Buona con bimbi':'Meglio valutare con bimbi'}</span>
      <span class="qfact ${park==='Sì'?'ok':'no'}">🅿️ Parcheggio: ${park}</span>
      <span class="qfact ${lidi==='Sì'?'ok':'no'}">⛱️ Lidi: ${lidi}</span>
      <span class="qfact">${dist!=null?'📍 '+fmtKm(dist):'📍 Distanza: attiva posizione'}</span>
    </div>
    <p class="ddesc">${b.d}</p>
    <div class="specs">
      <div class="spec"><div class="k">Tipo di costa</div><div class="v">${T[b.t]}</div></div>
      <div class="spec"><div class="k">Mare</div><div class="v">${b.mare}</div></div>
      <div class="spec"><div class="k">Accesso</div><div class="v">${b.acc}</div></div>
      <div class="spec"><div class="k">Affollamento</div><div class="v">${b.aff}</div></div>
      <div class="spec"><div class="k">Ombra</div><div class="v">${sh.type}</div></div>
      <div class="spec"><div class="k">Parcheggio</div><div class="v">${park}</div></div>
    </div>
    <div class="drow"><div class="lab">👶 A misura di bimbi</div>
      <div class="fscore">${"★".repeat(fam.score)}${"☆".repeat(5-fam.score)}<span>${fam.kid?"consigliata con bambini piccoli":"valuta in base all'età"}</span></div>
      <div class="feats">
        <span class="feat ${fam.sand?'ok':'no'}">${fam.sand?'✓':'✗'} Sabbia</span>
        <span class="feat ${fam.shallow?'ok':'no'}">${fam.shallow?'✓':'✗'} Acqua bassa/calma</span>
        <span class="feat ${fam.shade?'ok':'no'}">${fam.shade?'✓':'✗'} Ombra</span>
        <span class="feat ${fam.stroller?'ok':'no'}">${fam.stroller?'✓':'✗'} Passeggino</span>
        <span class="feat ${fam.park?'ok':'no'}">${fam.park?'✓':'✗'} Parcheggio vicino</span>
      </div>
    </div>
    <div class="drow"><div class="lab">Ideale per</div><div class="feats">${b.id.map(x=>`<span class="feat">${x}</span>`).join("")}</div></div>
    <div class="drow"><div class="lab">Servizi</div><div class="feats">${b.sv.map(x=>`<span class="feat">${x}</span>`).join("")}</div></div>
    <div class="drow"><div class="lab">ℹ️ Info utili</div><ul class="tips">${tips(b).map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <div class="near" id="near"><div class="lab">🍹 Bar e lidi nei paraggi</div><div class="list" id="nearlist"><span class="wxmuted">Cerco nei dintorni…</span></div>
      <div class="links"><a href="${lidoLink}" target="_blank" rel="noopener">⛱️ Tutti i lidi</a><a href="${barLink}" target="_blank" rel="noopener">🍸 Tutti i bar</a></div></div>
    <div class="near" id="nearkids"><div class="lab">👶 Utili con bambini</div><div class="list" id="kidslist"><span class="wxmuted">Cerco farmacia, parco giochi, bagni…</span></div></div>
    <div class="wikiload" id="wikiload">Carico approfondimento…</div>
    <div class="wiki" id="wikibox"><h4>📖 Approfondimento</h4><p id="wikitext"></p><a id="wikilink" href="#" target="_blank" rel="noopener">Continua su Wikipedia →</a></div>
    <div class="actions"><a class="act primary" href="${gmaps}" target="_blank" rel="noopener">🧭 Indicazioni</a>
      <a class="act sec" href="${photos}" target="_blank" rel="noopener">📷 Foto</a>
      <a class="act ter" href="${sat}" target="_blank" rel="noopener">🛰️ Satellite</a></div></div>`;
  detail.classList.add("open");app.classList.add("detailing");
  if(isMobile())setSheet("full");
  const favh=document.getElementById("favh");if(favh)favh.onclick=()=>{toggleFav(b);favh.textContent=isFav(b)?"❤️":"🤍";favh.setAttribute("aria-label",isFav(b)?"Rimuovi dai preferiti":"Aggiungi ai preferiti");renderList();};
  // setter immagine di copertina
  function setHero(src,page,credit){const hero=document.getElementById("dhero");if(!hero)return;let im=hero.querySelector("img.ph");if(!im){im=document.createElement("img");im.className="ph";hero.insertBefore(im,hero.firstChild);}im.alt=b.n;im.onerror=()=>{im.remove();const s2=hero.querySelector("svg");if(s2)s2.style.display="";const c2=hero.querySelector("a.credit");if(c2)c2.remove();};im.onload=()=>{const sv=hero.querySelector("svg");if(sv)sv.style.display="none";};im.src=src;let cr=hero.querySelector("a.credit");if(!cr){cr=document.createElement("a");cr.className="credit";cr.target="_blank";cr.rel="noopener";hero.appendChild(cr);}cr.href=page||"#";cr.textContent=credit||"© Wikimedia Commons";}
  let heroLocked=false;
  setHero(satImg(b),sat,"Vista satellitare");
  // METEO + VENTO + MARE in tempo reale
  Promise.all([weatherData(b.mlat,b.mlng),seaData(b.mlat,b.mlng)]).then(([w,sea])=>{
    if(selected!==token)return;const wx=document.getElementById("wx");if(!wx)return;
    if(!w){wx.innerHTML='<span class="wxmuted">Meteo non disponibile</span>';return;}
    const wc=WCODE[w.weather_code]||["",""];
    let h=`<span class="wxc">${wc[1]} <b>${Math.round(w.temperature_2m)}°</b> ${wc[0]}</span>`;
    h+=`<span class="wxc">💨 <b>${Math.round(w.wind_speed_10m)}</b> km/h · da ${windDir(w.wind_direction_10m)}</span>`;
    if(sea&&sea.sea_surface_temperature!=null)h+=`<span class="wxc">🌊 mare <b>${Math.round(sea.sea_surface_temperature)}°</b>${sea.wave_height!=null?" · onda "+sea.wave_height+" m":""}</span>`;
    if(w.uv_index!=null)h+=`<span class="wxc">☀️ UV <b>${Math.round(w.uv_index)}</b> ${uvLabel(w.uv_index)}</span>`;
    if(w.uv_index!=null&&w.uv_index>=6)h+=`<span class="wxc warn">🧴 Sole forte: ombra e crema, evita 12–16</span>`;
    if(w.wind_speed_10m>=26)h+=`<span class="wxc warn">💨 Vento forte: sabbia al vento, valuta un'alternativa</span>`;
    wx.innerHTML=h;
  });
  // FOTO: mostro solo se chiaramente di spiaggia/mare (s>=2), altrimenti resta la vista satellitare
  gatherPhotos(b).then(ph=>{
    if(selected!==token)return;const gal=document.getElementById("gallery");if(!gal)return;
    const strong=ph.filter(p=>p.s>=2);
    const cap=document.getElementById("galcap");
    if(!strong.length){if(cap)cap.style.display="none";return;}
    setHero(strong[0].thumb,strong[0].page,"© Wikimedia Commons");heroLocked=true;
    strong.forEach((p,idx)=>{const im=document.createElement("img");im.src=p.thumb;im.loading="lazy";if(idx===0)im.classList.add("on");im.onclick=()=>{setHero(p.thumb,p.page,"© Wikimedia Commons");gal.querySelectorAll("img").forEach(x=>x.classList.remove("on"));im.classList.add("on");};gal.appendChild(im);});
    if(cap)cap.style.display="block";
  });
  // APPROFONDIMENTO + (foto solo da articolo dedicato verificato)
  loadInfo(b).then(d=>{
    if(selected!==token)return;const load=document.getElementById("wikiload");
    if(!heroLocked&&d&&d.img&&!d.isComune&&WIKI[b.n]){setHero(d.img,d.url,"© Wikimedia Commons");heroLocked=true;}
    if(d&&d.extract&&d.extract.length>40){const box=document.getElementById("wikibox");if(box){document.getElementById("wikitext").textContent=d.extract;const lk=document.getElementById("wikilink");if(d.url&&lk)lk.href=d.url;else if(lk)lk.style.display="none";box.classList.add("show");}}
    if(load)load.textContent="";
  });
  // BAR / LIDI nei dintorni (OpenStreetMap)
  nearbyPOI(b.mlat,b.mlng).then(res=>{
    if(selected!==token)return;
    const link=p=>`<a class="poi" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+" "+b.c)}"><span>${p.name}</span><span class="t ${p.lido?'lido':(p.kind==='Farmacia'||p.kind==='Parco giochi'||p.kind==='Bagni'?'kid':'')}">${p.kind}</span></a>`;
    const el=document.getElementById("nearlist");
    if(el)el.innerHTML=res.beach.length?res.beach.map(link).join(""):'<span class="wxmuted">Nessun bar/lido registrato qui vicino — usa i link sotto.</span>';
    const k=document.getElementById("kidslist");
    if(k)k.innerHTML=res.kids.length?res.kids.map(link).join(""):'<span class="wxmuted">Nessun servizio per bambini registrato nei pressi.</span>';
  });
};
document.getElementById("dback").onclick=()=>{detail.classList.remove("open");app.classList.remove("detailing");if(isMobile())setSheet("half");};

/* ---------- BOTTOM SHEET MOBILE ---------- */
const sidebar=document.getElementById("sidebar"),grip=document.getElementById("grip"),gtxt=document.getElementById("gtxt");
const isMobile=()=>window.matchMedia("(max-width:860px)").matches;
let sheetT={peek:0,half:0,full:0};
function measure(){
  if(!isMobile())return;
  const h=sidebar.offsetHeight;
  sheetT={full:0,half:Math.round(h*.45),peek:Math.max(0,h-86)};
}
function sheetLabel(s){return s==="full"?"▼ Nascondi":s==="half"?"▲ Apri tutto / ▼ riduci":"▲ Mostra elenco spiagge";}
function setSheet(s){
  if(!isMobile()){sidebar.style.transform="";return;}
  if(!sheetT.peek)measure();
  if(!(s in sheetT))s="peek";
  sidebar.dataset.state=s;
  sidebar.style.transform=`translateY(${sheetT[s]}px)`;
  gtxt.textContent=sheetLabel(s);
}
let dragging=false,sY=0,baseT=0,moved=0;
function curT(){const m=/translateY\(([-\d.]+)px\)/.exec(sidebar.style.transform);return m?parseFloat(m[1]):sheetT.peek;}
function nearestSheet(t){return ["full","half","peek"].reduce((best,s)=>Math.abs(sheetT[s]-t)<Math.abs(sheetT[best]-t)?s:best,"peek");}
grip.addEventListener("touchstart",e=>{if(!isMobile())return;dragging=true;moved=0;sY=e.touches[0].clientY;baseT=curT();sidebar.style.transition="none";},{passive:true});
window.addEventListener("touchmove",e=>{if(!dragging)return;const dy=e.touches[0].clientY-sY;moved=Math.max(moved,Math.abs(dy));let t=Math.max(0,Math.min(sheetT.peek,baseT+dy));sidebar.style.transform=`translateY(${t}px)`;},{passive:true});
window.addEventListener("touchend",()=>{if(!dragging)return;dragging=false;sidebar.style.transition="";setSheet(nearestSheet(curT()));});
grip.addEventListener("click",()=>{if(!isMobile()||moved>6)return;const s=sidebar.dataset.state||"peek";setSheet(s==="peek"?"half":s==="half"?"full":"peek");});
map.on("click",()=>{if(isMobile()&&!detail.classList.contains("open"))setSheet("peek");});
document.getElementById("jSud").onclick=()=>map.flyTo([36.92,14.3],8,{duration:.7});
document.getElementById("jPel").onclick=()=>map.flyTo([35.55,12.6],10,{duration:.7});

/* CHECKLIST BORSA MARE */
const cmodal=document.getElementById("cmodal"),clistEl=document.getElementById("clist");
function renderChecks(){const s=loadChecks();clistEl.innerHTML=CHECK_ITEMS.map(it=>`<label class="citem ${s.has(it)?'done':''}"><input type="checkbox" data-it="${it.replace(/"/g,'&quot;')}" ${s.has(it)?'checked':''}><span>${it}</span></label>`).join("");clistEl.querySelectorAll("input").forEach(inp=>inp.onchange=()=>{const st=loadChecks();const it=inp.dataset.it;if(inp.checked)st.add(it);else st.delete(it);saveChecks(st);inp.closest(".citem").classList.toggle("done",inp.checked);});}
let lastFocus=null;
function openChecklist(){lastFocus=document.activeElement;renderChecks();cmodal.classList.add("open");setTimeout(()=>document.getElementById("cclose").focus(),0);}
function closeChecklist(){cmodal.classList.remove("open");if(lastFocus&&lastFocus.focus)lastFocus.focus();}
document.getElementById("btnCheck").onclick=openChecklist;
document.getElementById("cclose").onclick=closeChecklist;
cmodal.onclick=e=>{if(e.target===cmodal)closeChecklist();};
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&cmodal.classList.contains("open"))closeChecklist();});
document.getElementById("creset").onclick=()=>{saveChecks(new Set());renderChecks();};

renderList();
function boot(){map.invalidateSize();measure();setSheet(isMobile()?"peek":"full");}
setTimeout(boot,250);
window.addEventListener("resize",()=>{map.invalidateSize();measure();setSheet(sidebar.dataset.state||(isMobile()?"peek":"full"));});
window.addEventListener("orientationchange",()=>setTimeout(boot,300));
</script>
