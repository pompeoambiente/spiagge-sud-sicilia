{n:"La Guitgia",c:"Lampedusa",p:"Agrigento",lat:35.4998,lng:12.6055,t:"fine",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani"],sv:["Lidi","Bar/Ristoro","Parcheggio"],mare:"Turchese",d:"La spiaggia più centrale e attrezzata di Lampedusa, a due passi dal porto. Sabbia fine e mare calmo."},
{n:"Cala Pozzolana di Ponente",c:"Linosa",p:"Agrigento",lat:35.854,lng:12.856,t:"nera",bb:false,ris:"Riserva Isola di Linosa",acc:"Libera",aff:"Tranquilla",id:["Natura","Snorkeling","Relax"],sv:["Bar nei pressi"],mare:"Blu profondo",d:"Unica spiaggia di Linosa: sabbia e ghiaia rossastre di origine vulcanica ai piedi di falesie ocra. Sito di nidificazione delle tartarughe."},
{n:"Spiaggia di Gela",c:"Gela",p:"Caltanissetta",lat:37.057,lng:14.23,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Giovani"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Lungo arenile sabbioso lungo il lungomare cittadino, ampio e comodo. Tratti liberi e lidi attrezzati."},
{n:"Manfria",c:"Gela",p:"Caltanissetta",lat:37.076,lng:14.17,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Tranquilla",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio"],mare:"Limpido",d:"Spiaggia sabbiosa a ovest di Gela dominata da una torre cinquecentesca. Ambiente tranquillo, con dune."},
{n:"Falconara",c:"Butera",p:"Caltanissetta",lat:37.1015,lng:14.044,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Tranquilla",id:["Famiglie","Relax","Natura"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Sabbia dorata sotto lo scenografico Castello di Falconara affacciato sul mare. Tra le spiagge più pittoresche del nisseno."},
{n:"Scoglitti",c:"Vittoria",p:"Ragusa",lat:36.8915,lng:14.436,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Giovani","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Vivace borgo di pescatori con ampie spiagge sabbiose, lidi e ottima cucina di mare."},
{n:"Randello",c:"Vittoria",p:"Ragusa",lat:36.835,lng:14.452,t:"dorata",bb:false,ris:"Pineta di Randello",acc:"Libera",aff:"Tranquilla",id:["Natura","Relax","Famiglie"],sv:["Parcheggio","Pineta ombreggiata"],mare:"Limpido",d:"Spiaggia libera affiancata da una grande pineta demaniale che offre ombra naturale. Sabbia fine e atmosfera rilassata."},
{n:"Punta Braccetto",c:"Santa Croce Camerina",p:"Ragusa",lat:36.82,lng:14.464,t:"misto",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Snorkeling","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro","Camping"],mare:"Turchese basso",d:"Insenature di sabbia alternate a scogli piatti, con acque basse e trasparenti. Amata da famiglie e campeggiatori."},
{n:"Punta Secca",c:"Santa Croce Camerina",p:"Ragusa",lat:36.7935,lng:14.486,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro limpido",d:"Il borgo della 'casa di Montalbano': piazzetta sul mare, faro e una spiaggia di sabbia dorata accanto."},
{n:"Marina di Ragusa",c:"Ragusa",p:"Ragusa",lat:36.779,lng:14.552,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro","Noleggio","Accesso disabili"],mare:"Azzurro pulito",d:"La principale località balneare del Ragusano, Bandiera Blu: lunga spiaggia attrezzata, porto turistico e movida estiva."},
{n:"Marina di Modica",c:"Modica",p:"Ragusa",lat:36.715,lng:14.788,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Spiaggia sabbiosa Bandiera Blu, frequentata anche dai surfisti per il vento. Acque pulite e lidi curati."},
{n:"Sampieri",c:"Scicli",p:"Ragusa",lat:36.732,lng:14.746,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax","Tramonto"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro limpido",d:"Lunga spiaggia dorata dominata dai ruderi della Fornace Penna (la 'Mànnara' di Montalbano). Tramonti spettacolari."},
{n:"Cava d'Aliga",c:"Scicli",p:"Ragusa",lat:36.71,lng:14.718,t:"misto",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Snorkeling"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Turchese",d:"Piccola baia di sabbia racchiusa tra bassi scogli, con acque calme e limpide. Frazione tranquilla e a misura di famiglia."},
{n:"Donnalucata",c:"Scicli",p:"Ragusa",lat:36.729,lng:14.645,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Borgo di pescatori con spiagge sabbiose ai lati del porticciolo e mercato del pesce al mattino. Autentico e tranquillo."},
{n:"Pozzallo (Raganzino)",c:"Pozzallo",p:"Ragusa",lat:36.724,lng:14.836,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani","Accesso disabili"],sv:["Lidi","Parcheggio","Bar/Ristoro","Accesso disabili"],mare:"Azzurro pulito",d:"Lunga spiaggia urbana Bandiera Blu con la torre Cabrera sul lungomare. Sabbia fine e servizi completi."},
{n:"Santa Maria del Focallo",c:"Ispica",p:"Ragusa",lat:36.687,lng:14.918,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Natura","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Cristallino",d:"Oltre 7 km di sabbia fine e dune di macchia mediterranea, Bandiera Blu. Vastissima e mai troppo affollata."},
{n:"Marina di Marza",c:"Ispica",p:"Ragusa",lat:36.685,lng:14.96,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Tranquilla",id:["Famiglie","Natura","Relax"],sv:["Lidi","Parcheggio"],mare:"Limpido",d:"Distesa sabbiosa con dune in prosecuzione di Santa Maria del Focallo, verso il confine siracusano. Tranquilla e selvaggia."},
{n:"Isola delle Correnti",c:"Portopalo di Capo Passero",p:"Siracusa",lat:36.652,lng:15.13,t:"dorata",bb:false,ris:"",acc:"Libera",aff:"Media",id:["Natura","Sport acquatici","Tramonto"],sv:["Bar nei pressi","Parcheggio"],mare:"Due mari, turchese",d:"L'estremo lembo sud della Sicilia, dove Ionio e Mediterraneo si incontrano. Molto ventosa: paradiso di kite e windsurf."},
{n:"Spiaggia dell'Isola (Capo Passero)",c:"Portopalo di Capo Passero",p:"Siracusa",lat:36.688,lng:15.132,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Snorkeling","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Turchese",d:"Spiaggia di fronte all'isolotto di Capo Passero, con sabbia chiara e acque basse e trasparenti."},
{n:"San Lorenzo",c:"Marzamemi",p:"Siracusa",lat:36.73,lng:15.112,t:"bianca",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Snorkeling","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Smeraldo cristallino",d:"Una delle spiagge più belle del sud-est: sabbia bianca finissima e acqua bassa color smeraldo, quasi caraibica."},
{n:"Marzamemi",c:"Pachino",p:"Siracusa",lat:36.74,lng:15.117,t:"scogli",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Snorkeling","Relax","Tramonto"],sv:["Bar/Ristoro","Parcheggio"],mare:"Limpido",d:"Borgo marinaro tra i più belli d'Italia attorno alla tonnara: balneazione da scogli piatti e piccole insenature, aperitivi al tramonto."},
{n:"Calamosche",c:"Noto",p:"Siracusa",lat:36.805,lng:15.1085,t:"dorata",bb:false,ris:"Riserva di Vendicari",acc:"Libera",aff:"Media",id:["Natura","Snorkeling","Trekking/Calette","Relax"],sv:["Parcheggio + 1 km a piedi"],mare:"Turchese trasparente",d:"Caletta di sabbia dorata racchiusa tra due promontori rocciosi, nella riserva di Vendicari. Niente lidi: si arriva solo a piedi."},
{n:"Spiaggia di Vendicari (Marianelli)",c:"Noto",p:"Siracusa",lat:36.796,lng:15.0945,t:"dorata",bb:false,ris:"Riserva di Vendicari",acc:"Libera",aff:"Tranquilla",id:["Natura","Relax","Trekking/Calette"],sv:["Parcheggio + sentiero"],mare:"Cristallino",d:"Spiaggia selvaggia tra dune e macchia mediterranea, nel cuore della riserva con la tonnara e i fenicotteri."},
{n:"Eloro / Pizzuta",c:"Noto",p:"Siracusa",lat:36.842,lng:15.1075,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Natura","Relax"],sv:["Lidi","Parcheggio"],mare:"Azzurro",d:"Ampia spiaggia di sabbia accanto all'area archeologica greca di Eloro e alla foce del Tellaro."},
{n:"Lido di Noto",c:"Noto",p:"Siracusa",lat:36.832,lng:15.099,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro","Noleggio"],mare:"Azzurro",d:"La spiaggia marittima di Noto, lunga e attrezzata, con lidi e locali. Base balneare per chi visita la città barocca."},
{n:"Calabernardo",c:"Noto",p:"Siracusa",lat:36.856,lng:15.118,t:"misto",bb:false,ris:"",acc:"Misto",aff:"Tranquilla",id:["Famiglie","Snorkeling","Relax"],sv:["Bar/Ristoro","Parcheggio"],mare:"Limpido",d:"Piccolo borgo con spiaggetta di sabbia e scogli alla foce di un torrente. Tranquillo e autentico, amato dai locali."},
{n:"Fontane Bianche",c:"Siracusa",p:"Siracusa",lat:36.998,lng:15.282,t:"bianca",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro","Noleggio"],mare:"Turchese chiaro",d:"Baia di sabbia bianca finissima e acqua bassa e chiara, tra le più popolari del Siracusano. Molto attrezzata e vivace."},
{n:"Gelsomineto",c:"Siracusa",p:"Siracusa",lat:37.015,lng:15.276,t:"dorata",bb:false,ris:"",acc:"Libera",aff:"Tranquilla",id:["Natura","Snorkeling","Trekking/Calette"],sv:["Parcheggio + discesa a piedi"],mare:"Turchese",d:"Caletta libera di sabbia incastonata tra le rocce, con una breve discesa. Acqua limpidissima e ambiente naturale."},
{n:"Arenella",c:"Siracusa",p:"Siracusa",lat:37.025,lng:15.298,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Spiaggia sabbiosa a sud di Siracusa, comoda e ben servita, con fondale dolce adatto ai bambini."},
{n:"Plemmirio (Punta della Mola)",c:"Siracusa",p:"Siracusa",lat:37.003,lng:15.308,t:"scogli",bb:false,ris:"Area Marina Protetta Plemmirio",acc:"Libera",aff:"Media",id:["Snorkeling","Natura","Trekking/Calette"],sv:["Parcheggio"],mare:"Blu cristallino",d:"Costa rocciosa dell'area marina protetta: scogli piatti, grotte e fondali ricchissimi. Top per snorkeling e immersioni."},
{n:"Tonnarella",c:"Mazara del Vallo",p:"Trapani",lat:37.6625,lng:12.568,t:"dorata",bb:true,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro pulito",d:"La spiaggia di Mazara del Vallo: lunga sabbia dorata premiata con la Bandiera Blu, lidi e lungomare. Fondale dolce, ottima per famiglie."},
{n:"Tre Fontane",c:"Campobello di Mazara",p:"Trapani",lat:37.576,lng:12.74,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Limpido",d:"Località balneare con ampia spiaggia sabbiosa e dune, molto frequentata d'estate dalle famiglie del trapanese."},
{n:"Torretta Granitola",c:"Campobello di Mazara",p:"Trapani",lat:37.566,lng:12.665,t:"misto",bb:false,ris:"",acc:"Misto",aff:"Tranquilla",id:["Snorkeling","Relax","Natura"],sv:["Parcheggio","Bar nei pressi"],mare:"Cristallino",d:"Tratti di sabbia e scogli piatti attorno al faro di Capo Granitola, con acque limpide ideali per lo snorkeling."},
{n:"Lido Signorino",c:"Marsala",p:"Trapani",lat:37.756,lng:12.435,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Tramonto","Sport acquatici"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"La spiaggia di Marsala affacciata verso le Egadi, con sabbia e tramonti famosi. Vento spesso presente, amata anche dai kiter."},
{n:"Spiaggia dello Stagnone",c:"Marsala",p:"Trapani",lat:37.87,lng:12.438,t:"fine",bb:false,ris:"Riserva dello Stagnone",acc:"Misto",aff:"Media",id:["Sport acquatici","Natura","Tramonto"],sv:["Scuole kite","Parcheggio","Bar/Ristoro"],mare:"Laguna bassa",d:"Laguna poco profonda tra le saline e l'isola di Mozia: acqua bassa e calda, capitale del kitesurf in Sicilia e tramonti spettacolari."},
{n:"Spiaggia di San Giuliano",c:"Trapani",p:"Trapani",lat:38.045,lng:12.515,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Famiglie","Giovani"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"La lunga spiaggia urbana di Trapani, sabbiosa e attrezzata, con vista su Erice e le Egadi."},

{n:"Spiaggia di Macari",c:"San Vito Lo Capo",p:"Trapani",lat:38.17,lng:12.708,t:"misto",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Natura","Snorkeling","Tramonto"],sv:["Parcheggio","Bar nei pressi"],mare:"Turchese",d:"Calette di sabbia e ciottoli affacciate sul Golfo del Cofano, acque trasparenti e tramonti tra i più belli del trapanese."},
{n:"Riserva dello Zingaro",c:"San Vito Lo Capo",p:"Trapani",lat:38.09,lng:12.83,t:"ciottoli",bb:false,ris:"Riserva dello Zingaro",acc:"Libera",aff:"Media",id:["Natura","Snorkeling","Trekking/Calette"],sv:["Sentiero, nessun servizio"],mare:"Cristallino",d:"Calette di ciottoli bianchi (Cala dell'Uzzo, Cala Marinella) lungo il sentiero costiero della prima riserva naturale siciliana. Acqua trasparentissima."},
{n:"Scopello",c:"Castellammare del Golfo",p:"Trapani",lat:38.076,lng:12.81,t:"scogli",bb:false,ris:"",acc:"Misto",aff:"Affollata",id:["Snorkeling","Natura","Relax"],sv:["Bar/Ristoro","Parcheggio"],mare:"Turchese cristallino",d:"Balneazione tra i celebri faraglioni e l'antica tonnara di Scopello: scogli, piattaforme e acqua trasparente. Scenario iconico."},
{n:"Guidaloca",c:"Castellammare del Golfo",p:"Trapani",lat:38.056,lng:12.842,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Snorkeling","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Turchese",d:"Baia di sabbia e ghiaia fine racchiusa tra promontori, con acque calme e basse. Comoda e a misura di famiglia, tra Scopello e Castellammare."},
{n:"Cala Petrolo",c:"Castellammare del Golfo",p:"Trapani",lat:38.029,lng:12.883,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Parcheggio","Bar/Ristoro"],mare:"Azzurro",d:"Spiaggia cittadina di Castellammare del Golfo accanto al porto e al castello, sabbiosa e comoda."},
{n:"Cala Rossa",c:"Favignana",p:"Trapani",lat:37.942,lng:12.347,t:"bianca",bb:false,ris:"",acc:"Libera",aff:"Affollata",id:["Snorkeling","Natura","Relax"],sv:["Nessun servizio"],mare:"Turchese intenso",d:"Tra le calette più belle del Mediterraneo: ex cava di tufo a picco sull'acqua turchese, fondali da sogno per lo snorkeling. Niente sabbia, ci si stende sulla roccia."},
{n:"Lido Burrone",c:"Favignana",p:"Trapani",lat:37.908,lng:12.332,t:"dorata",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Famiglie","Relax"],sv:["Lidi","Bar/Ristoro"],mare:"Turchese basso",d:"La spiaggia di sabbia più attrezzata di Favignana, con acqua bassa e trasparente: la più adatta alle famiglie sull'isola."},
{n:"Cala Azzurra",c:"Favignana",p:"Trapani",lat:37.906,lng:12.346,t:"fine",bb:false,ris:"",acc:"Misto",aff:"Media",id:["Snorkeling","Famiglie","Relax"],sv:["Bar nei pressi"],mare:"Azzurro trasparente",d:"Baia riparata di sabbia e roccia con acqua bassissima e cristallina, vicino a Punta Marsala. Perfetta per snorkeling e bambini."},
{n:"Cala Minnola",c:"Levanzo",p:"Trapani",lat:38.001,lng:12.346,t:"ciottoli",bb:false,ris:"",acc:"Libera",aff:"Tranquilla",id:["Snorkeling","Natura","Relax"],sv:["Nessun servizio"],mare:"Cristallino",d:"Caletta di ciottoli sull'isola di Levanzo, immersa nella pineta, con un sito archeologico sottomarino. Acqua limpidissima."},
{n:"Cala Bianca (Marettimo)",c:"Marettimo",p:"Trapani",lat:37.965,lng:12.078,t:"ciottoli",bb:false,ris:"",acc:"Libera",aff:"Tranquilla",id:["Natura","Snorkeling","Trekking/Calette"],sv:["Nessun servizio"],mare:"Trasparente",d:"Spiaggia di ciottoli bianchi sull'isola più selvaggia delle Egadi, raggiungibile a piedi o in barca. Mare incontaminato."},
{n:"Arco dell'Elefante",c:"Pantelleria",p:"Trapani",lat:36.78,lng:12.048,t:"scogli",bb:false,ris:"",acc:"Libera",aff:"Media",id:["Snorkeling","Natura"],sv:["Nessun servizio"],mare:"Blu intenso",d:"Il simbolo di Pantelleria: l'arco di roccia lavica che si tuffa nel mare. Ci si bagna dagli scogli in acque profonde e cristalline."},
{n:"Balata dei Turchi",c:"Pantelleria",p:"Trapani",lat:36.732,lng:11.987,t:"scogli",bb:false,ris:"",acc:"Libera",aff:"Tranquilla",id:["Natura","Snorkeling","Relax"],sv:["Nessun servizio"],mare:"Blu profondo",d:"Insenatura selvaggia di roccia vulcanica nel sud di Pantelleria, un tempo approdo dei corsari. Acqua profonda e trasparente, ambiente intatto."}

function todayScore(b,w,sea){
  let score=6;
  const temp=Number(w&&w.temperature_2m),wind=Number(w&&w.wind_speed_10m),uv=Number(w&&w.uv_index);
  const wave=sea&&sea.wave_height!=null?Number(sea.wave_height):null;
  if(Number.isFinite(temp)){if(temp>=24&&temp<=31)score+=1.2;else if(temp>=20&&temp<24)score+=.4;else if(temp>34)score-=1.1;else if(temp<19)score-=1;}
  if(Number.isFinite(wind)){if(wind<=14)score+=1;else if(wind<=24)score+=.25;else if(wind<=34)score-=.8;else score-=1.6;}
  if(Number.isFinite(uv)){if(uv>=8)score-=.45;else if(uv<=5)score+=.15;}
  if(Number.isFinite(wave)){if(wave<=.4)score+=.5;else if(wave>=1.1)score-=.7;}
  if(b.bb)score+=.35;
  if((b.ideal||[]).includes("Famiglie"))score+=.35;
  if((b.sv||[]).some(s=>/Parchegg/i.test(s)))score+=.25;
  if((b.sv||[]).some(s=>/Lid/i.test(s)))score+=.15;
  if(b.aff==="Tranquilla")score+=.25;
  if(b.aff==="Affollata")score-=.35;
  if(/scogli|ciottoli/.test(b.t)&&Number.isFinite(wind)&&wind>=25)score-=.25;
  return Math.max(0,Math.min(10,Math.round(score*10)/10));
}

  if(Number.isFinite(wind)&&wind>=26)notes.push("vento sostenuto: meglio spiagge riparate o kite/windsurf");

}

let geoTimer=null;
async function geocode(q){try{const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&accept-language=it&countrycodes=it&q="+encodeURIComponent(q),{headers:{accept:"application/json"}});if(!r.ok)return [];return await r.json();}catch(e){return [];}}
const shorten=s=>s?s.split(",").slice(0,3).join(", "):"";
function hidePlaces(){const pr=document.getElementById("placeResults");if(pr){pr.innerHTML="";pr.classList.add("hidden");}}
function showPlaces(html){const pr=document.getElementById("placeResults");if(pr){pr.innerHTML=html;pr.classList.remove("hidden");}}
function gotoPlace(lat,lng,name){
  if(placeMarker)placeMarker.remove();
  placeMarker=L.marker([lat,lng],{icon:L.divIcon({className:"custom-marker",html:'<div style="background:#7A3CC0;width:24px;height:24px" class="rounded-full border-2 border-white shadow-lg flex items-center justify-center"><span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings:\'FILL\' 1;">place</span></div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map).bindPopup(name.split(",")[0]).openPopup();
  hidePlaces();qInput.blur();
  map.flyTo([lat,lng],13,{duration:.8});setSheet("peek");
}
function searchPlaces(term){
  if(term.length<3){hidePlaces();return;}
  showPlaces('<div class="text-on-surface-variant text-xs font-semibold py-2">Cerco luoghi…</div>');
  clearTimeout(geoTimer);
  geoTimer=setTimeout(async()=>{
    const res=await geocode(term);
    if(qInput.value.trim()!==term)return;
    if(!res.length){hidePlaces();return;}
    showPlaces('<div class="text-[10px] font-bold uppercase tracking-widest text-search-purple pt-1 pb-1">Vai a un luogo</div>'+res.map(p=>`<div class="placerow flex items-start gap-2 py-2 border-b border-outline-variant/10 text-sm font-medium cursor-pointer" data-lat="${p.lat}" data-lon="${p.lon}" data-name="${(p.display_name||'').replace(/"/g,'&quot;')}"><span class="material-symbols-outlined text-[18px] text-search-purple">location_on</span><span>${shorten(p.display_name)}</span></div>`).join(""));

/* ============ BOTTOM SHEET ============ */
const sheet=document.getElementById("beachSheet"),handle=document.getElementById("sheetHandle");
let sheetState="peek";
function targets(){const H=sheet.offsetHeight;return{full:0,half:H*0.45,peek:H-200};}
function setSheet(s){const t=targets();if(!(s in t))s="peek";sheetState=s;sheet.style.transform="";sheet.classList.remove("half","full");if(s==="half")sheet.classList.add("half");if(s==="full")sheet.classList.add("full");}
handle.addEventListener("click",()=>{if(dragMoved>6)return;setSheet(sheetState==="peek"?"half":sheetState==="half"?"full":"peek");});
let dragging=false,startY=0,baseT=0,dragMoved=0,lastY=0,lastT=0,vel=0;
handle.addEventListener("touchstart",e=>{dragging=true;dragMoved=0;startY=e.touches[0].clientY;lastY=startY;lastT=Date.now();baseT=targets()[sheetState];sheet.style.transition="none";},{passive:true});
window.addEventListener("touchmove",e=>{if(!dragging)return;const cy=e.touches[0].clientY,dy=cy-startY,now=Date.now(),dt=now-lastT;if(dt>0)vel=(cy-lastY)/dt;lastY=cy;lastT=now;dragMoved=Math.max(dragMoved,Math.abs(dy));const t=targets();let v=Math.max(0,Math.min(t.peek,baseT+dy));sheet.style.transform=`translateY(${v}px)`;},{passive:true});
window.addEventListener("touchend",()=>{if(!dragging)return;dragging=false;sheet.style.transition="";const t=targets();const cur=baseT+(lastY-startY);let s;if(Math.abs(vel)>0.45){const down=vel>0;s=down?(sheetState==="full"?"half":"peek"):(sheetState==="peek"?"half":"full");}else{s=["full","half","peek"].reduce((b,k)=>Math.abs(t[k]-cur)<Math.abs(t[b]-cur)?k:b,"peek");}setSheet(s);});
